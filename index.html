<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Hand Tracking</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-J09W84X821"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-J09W84X821');
</script>
    <!-- MediaPipe Libraries from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #030812;
            --panel-bg: rgba(10, 20, 35, 0.35);
            --panel-border: rgba(0, 240, 255, 0.3);
            --text-color: #e2e8f0;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.6);
            --danger: #ff0055;
            --success: #00ff88;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at center, #0b192c 0%, #030812 100%),
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* Video / Canvas Layers */
        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .input_video {
            display: none;
        }

        .output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Glassmorphism UI Panels */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.05);
            padding: 24px;
            z-index: 10;
            position: relative;
            overflow: hidden;
        }
        
        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.8;
        }

        /* Left Sidebar Panel */
        .sidebar {
            position: absolute;
            top: 24px;
            left: 24px;
            bottom: 84px; /* leaves room for Toggle UI button */
            width: 320px;
            display: flex;
            flex-direction: column;
            background: rgba(3, 10, 20, 0.65);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 240, 255, 0.05);
            z-index: 20;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sidebar Visibility Toggle States */
        .ui-collapsed .sidebar {
            transform: translateX(-360px);
            opacity: 0;
            pointer-events: none;
        }

        .header-graph {
            opacity: 0.8;
            filter: drop-shadow(0 0 3px rgba(0, 240, 255, 0.4));
        }

        .fps-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fps-badge {
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.05);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.85rem;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
        }

        .tracking-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.02);
            color: var(--accent);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 16px;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
            transition: all 0.3s ease;
        }

        .tracking-indicator svg {
            filter: drop-shadow(0 0 3px rgba(0, 240, 255, 0.5));
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            box-sizing: border-box;
            text-transform: uppercase;
            font-family: inherit;
        }

        /* View Options Buttons */
        .btn-view-opt {
            border: 1px solid rgba(0, 240, 255, 0.15);
            color: var(--accent);
        }
        .btn-view-opt:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
        }
        .btn-view-opt.active {
            background: var(--accent);
            color: #030812;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            text-shadow: none;
        }

        /* Tools Buttons */
        .btn-tool-zoom {
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--accent);
        }
        .btn-tool-zoom:hover {
            background: rgba(0, 240, 255, 0.08);
        }
        .btn-tool-zoom.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn-tool-ironman {
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .btn-tool-ironman:hover {
            background: rgba(239, 68, 68, 0.08);
        }
        .btn-tool-ironman.active {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.35);
        }

        .btn-tool-accessorize {
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }
        .btn-tool-accessorize:hover {
            background: rgba(168, 85, 247, 0.08);
        }
        .btn-tool-accessorize.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: #fff;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.35);
        }

        .btn-tool-globe {
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }
        .btn-tool-globe:hover {
            background: rgba(59, 130, 246, 0.08);
        }
        .btn-tool-globe.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.35);
        }

        .btn-tool-reset {
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #94a3b8;
        }
        .btn-tool-reset:hover {
            background: rgba(148, 163, 184, 0.1);
            color: #fff;
        }

        /* Toggle UI button */
        .btn-toggle-ui {
            position: absolute;
            bottom: 24px;
            left: 24px;
            width: 320px;
            z-index: 100;
            background: rgba(3, 10, 20, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-toggle-ui:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .ui-collapsed .btn-toggle-ui {
            width: 140px;
            background: rgba(3, 10, 20, 0.85);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* Main Viewport for Camera */
        .main-viewport {
            position: absolute;
            top: 24px;
            left: 368px;
            right: 24px;
            bottom: 24px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            z-index: 5;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.6);
            background: #000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ui-collapsed .main-viewport {
            left: 24px;
        }

        /* HUD Corner Brackets */
        .corner-bracket {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent);
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 3px var(--accent-glow));
        }
        .corner-bracket.top-left {
            top: 12px;
            left: 12px;
            border-right: none;
            border-bottom: none;
        }
        .corner-bracket.top-right {
            top: 12px;
            right: 12px;
            border-left: none;
            border-bottom: none;
        }
        .corner-bracket.bottom-left {
            bottom: 12px;
            left: 12px;
            border-right: none;
            border-top: none;
        }
        .corner-bracket.bottom-right {
            bottom: 12px;
            right: 12px;
            border-left: none;
            border-top: none;
        }

        /* Emotion Panel */
        .emotion-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(3, 10, 20, 0.65);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 240, 255, 0.05);
            z-index: 20;
            text-align: center;
            min-width: 140px;
            transition: all 0.4s ease;
        }

        .emotion-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .emotion-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(3, 8, 15, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover {
            color: var(--danger);
        }

        .modal-title {
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 24px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .accessory-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            width: 100%;
            justify-content: center;
        }

        .accessory-item {
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .accessory-item:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.1);
        }

        .accessory-item.selected {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e2e8f0;
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #e2e8f0;
        }

        .btn-proceed {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #030812;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        .btn-proceed:hover {
            background: #00c0cc;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Toggle UI Button -->
        <button class="sidebar-btn btn-toggle-ui" id="btnToggleUI">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 8s3-5.5 7-5.5S15 8 15 8s-3 5.5-7 5.5S1 8 1 8z"/><circle cx="8" cy="8" r="2"/></svg>
            <span>Toggle UI</span>
        </button>

        <!-- Loading Screen -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Initializing AI Models & Camera...</div>
        </div>

        <!-- Main Viewport (Video/Canvas & Corners) -->
        <div class="main-viewport" id="mainViewport">
            <!-- HUD Corner Brackets -->
            <div class="corner-bracket top-left"></div>
            <div class="corner-bracket top-right"></div>
            <div class="corner-bracket bottom-left"></div>
            <div class="corner-bracket bottom-right"></div>

            <div class="video-wrapper">
                <video class="input_video" autoplay playsinline></video>
                <canvas class="output_canvas" id="canvas"></canvas>
            </div>

            <!-- Emotion Container -->
            <div class="emotion-panel" id="emotionPanel">
                <div class="emotion-title">EMOTION</div>
                <div class="emotion-value" id="emotionDisplay">Neutral 😐</div>
            </div>
        </div>

        <!-- Left Sidebar Panel -->
        <div class="sidebar" id="sidebarPanel">
            <div class="sidebar-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="status-dot" id="statusDot"></div>
                    <span style="font-weight: 700; letter-spacing: 1px; font-size: 1.1rem; color: #fff;">HAND TRACKER</span>
                </div>
                <svg class="header-graph" width="40" height="16" viewBox="0 0 40 16" fill="none">
                    <path d="M1 8H6L9 2L13 14L16 6L19 10L22 8H39" stroke="rgba(0, 240, 255, 0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>

            <div class="fps-container">
                <span style="color: #64748b; font-size: 0.85rem; font-weight: 500;">FPS</span>
                <span class="fps-badge" id="fpsDisplay">--</span>
            </div>

            <div style="margin-top: 16px;">
                <span class="section-label">Tracking</span>
                <div class="tracking-indicator">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M10 10.5V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v9"/><path d="M6 13V9a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10c0 5.5 4.5 10 10 10h1a10 10 0 0 0 10-10v-3.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2V11"/></svg>
                    <span id="gestureBoxText">TRACKING FINGERS</span>
                </div>
                <div id="sidebarTotalFingersPanel" style="display: none; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(0, 240, 255, 0.02); margin-bottom: 16px; transition: all 0.3s ease;">
                    <span style="font-size: 0.8rem; font-weight: 600; color: var(--accent); letter-spacing: 1px;">TOTAL FINGERS OPEN</span>
                    <span id="totalFingersDisplay" style="font-size: 1.2rem; font-weight: 800; color: var(--accent); font-family: monospace; text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);">--</span>
                </div>
            </div>

            <div style="margin-top: 8px;">
                <span class="section-label">View Options</span>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="sidebar-btn btn-view-opt active" id="btnSkeleton">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><line x1="5.5" y1="10.5" x2="10.5" y2="5.5"/></svg>
                        <span>Toggle Skeleton</span>
                    </button>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <span class="section-label">Tools</span>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="sidebar-btn btn-tool-zoom" id="btnPinchZoom">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="4"/><line x1="10" y1="10" x2="14" y2="14"/><line x1="7" y1="5" x2="7" y2="9"/><line x1="5" y1="7" x2="9" y2="7"/></svg>
                        <span>Toggle Pinch Zoom</span>
                    </button>
                    <button class="sidebar-btn btn-tool-ironman" id="btnIronman">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L4 7v6c0 5.25 3.75 10.12 8 12 4.25-1.88 8-6.75 8-12V7l-8-5z"/><path d="M8 11h2v2H8zm6 0h2v2h-2z"/><path d="M9 16h6"/></svg>
                        <span>Assemble Ironman</span>
                    </button>
                    <button class="sidebar-btn btn-tool-accessorize" id="btnAccessorize">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h20"/><circle cx="7" cy="12" r="5"/><circle cx="17" cy="12" r="5"/></svg>
                        <span>Accessorize(beta)</span>
                    </button>
                    <button class="sidebar-btn btn-tool-globe" id="btnGlobe">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="7"/><line x1="1" y1="8" x2="15" y2="8"/><path d="M8 1a10.9 10.9 0 0 1 3.5 7 10.9 10.9 0 0 1-3.5 7 10.9 10.9 0 0 1-3.5-7 10.9 10.9 0 0 1 3.5-7z"/></svg>
                        <span>Globe Mode</span>
                    </button>
                    <button class="sidebar-btn btn-tool-reset" id="btnReset">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 8A6 6 0 1 1 8 2v0"/><path d="M10 4L8 2l2-2"/></svg>
                        <span>Reset Style</span>
                    </button>
                </div>

        </div>
        
        <!-- Accessorize Modal -->
        <div class="modal-overlay" id="accessorizeModal">

                            <rect x="2" y="4" width="22" height="16" rx="4" fill="#111" stroke="#333" stroke-width="2"/>
                            <rect x="36" y="4" width="22" height="16" rx="4" fill="#111" stroke="#333" stroke-width="2"/>
                            <path d="M24 10 Q 30 6 36 10" stroke="#333" stroke-width="3" fill="none"/>
                            <line x1="0" y1="8" x2="2" y2="8" stroke="#333" stroke-width="3"/>
                            <line x1="58" y1="8" x2="60" y2="8" stroke="#333" stroke-width="3"/>
                        </svg>
                        <div style="margin-top: 8px; font-size: 0.8rem; color: #94a3b8;">Wafer Glasses</div>

    </div>

    <script>
        // --- DOM Elements ---
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const glassesImg = new Image();
        glassesImg.src = 'glasses.png';

        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusDot = document.getElementById('statusDot');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const gestureBoxText = document.getElementById('gestureBoxText');
        const totalFingersDisplay = document.getElementById('totalFingersDisplay');

        // --- Global State ---
        let latestHandResults = null;
        let latestFaceResults = null;

        // Exposed facial landmarks coordinates (x, y, z in normalized coordinates)
        let faceData = {
            noseTip: null,
            leftEyeCenter: null,
            rightEyeCenter: null,
            chin: null,
            forehead: null,
            leftEar: null,
            rightEar: null
        };

        // --- State ---
        let isSkeletonEnabled = true;
        let isLoaded = false;
        let isUIVisible = true;
        let isPinchZoomEnabled = false;

        let ironState = 'none'; // 'none', 'incoming', 'active'
        let ironStartMs = 0;
        let repulsorStartMs = 0;
        let ironPieces = [];

        let globeMode = false;
        let globeRotX = 0;
        let globeRotY = 0;
        
        let zoomScale = 1.0;
        let prevGlobalPinchDist = -1;

        let hearts = [];

        // --- Modal & Accessory State ---
        let selectedAccessory = null;
        let appliedAccessory = null;

        // FPS Tracker
        let lastTime = 0;
        let frames = 0;

        // --- Controls ---
        document.getElementById('btnSkeleton').addEventListener('click', (e) => {
            isSkeletonEnabled = !isSkeletonEnabled;
            e.currentTarget.classList.toggle('active', isSkeletonEnabled);
        });

        document.getElementById('btnPinchZoom').addEventListener('click', (e) => {
            isPinchZoomEnabled = !isPinchZoomEnabled;
            e.currentTarget.classList.toggle('active', isPinchZoomEnabled);
            if (!isPinchZoomEnabled) prevGlobalPinchDist = -1;
        });

        const btnIronman = document.getElementById('btnIronman');
        const btnGlobe = document.getElementById('btnGlobe');
        const btnReset = document.getElementById('btnReset');
        const btnToggleUI = document.getElementById('btnToggleUI');
        
        const btnAccessorize = document.getElementById('btnAccessorize');
        const accessorizeModal = document.getElementById('accessorizeModal');
        const modalClose = document.getElementById('modalClose');
        const modalReset = document.getElementById('modalReset');
        const modalProceed = document.getElementById('modalProceed');
        const accGlasses = document.getElementById('accGlasses');

        btnToggleUI.addEventListener('click', () => {
             isUIVisible = !isUIVisible;
             document.body.classList.toggle('ui-collapsed', !isUIVisible);
        });

        btnAccessorize.addEventListener('click', () => {
            accessorizeModal.classList.add('active');
            btnAccessorize.classList.add('active');
        });

        const closeModal = () => {
            accessorizeModal.classList.remove('active');
            if (!appliedAccessory) {
                btnAccessorize.classList.remove('active');
            }
        };

        modalClose.addEventListener('click', closeModal);

        accGlasses.addEventListener('click', () => {
            accGlasses.classList.toggle('selected');
            if (accGlasses.classList.contains('selected')) {
                selectedAccessory = 'wafer_glasses';
            } else {
                selectedAccessory = null;
            }
        });

        modalReset.addEventListener('click', () => {
            selectedAccessory = null;
            appliedAccessory = null;
            accGlasses.classList.remove('selected');
            btnAccessorize.classList.remove('active');
        });

        modalProceed.addEventListener('click', () => {
            appliedAccessory = selectedAccessory;
            if (!appliedAccessory) {
                btnAccessorize.classList.remove('active');
            }
            closeModal();
        });

        function initIronmanPieces() {
            ironPieces = [];
            for (let i = 0; i <= 21; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 1000 + Math.random() * 800; // start off-screen
                const sx = Math.cos(angle) * dist;
                const sy = Math.sin(angle) * dist;
                ironPieces.push({
                    sx, sy,
                    delay: Math.random() * 600, // up to 600ms start delay
                    duration: 600 + Math.random() * 500 // travel time 600-1100ms
                });
            }
        }

        btnIronman.addEventListener('click', () => {
            if (ironState === 'none') {
                ironState = 'incoming';
                globeMode = false;
                btnGlobe.classList.remove('active');
                ironStartMs = performance.now();
                repulsorStartMs = performance.now();
                initIronmanPieces();
                btnIronman.classList.add('active');
            } else {
                ironState = 'none';
                btnIronman.classList.remove('active');
            }
        });
        
        btnGlobe.addEventListener('click', () => {
             globeMode = !globeMode;
             if (globeMode) {
                 ironState = 'none';
                 btnIronman.classList.remove('active');
                 btnGlobe.classList.add('active');
             } else {
                 btnGlobe.classList.remove('active');
             }
        });

        btnReset.addEventListener('click', () => {
            ironState = 'none';
            globeMode = false;
            isSkeletonEnabled = true;
            isPinchZoomEnabled = false;
            
            btnIronman.classList.remove('active');
            btnGlobe.classList.remove('active');
            document.getElementById('btnSkeleton').classList.add('active');
            document.getElementById('btnPinchZoom').classList.remove('active');
            
            btnAccessorize.classList.remove('active');
            selectedAccessory = null;
            appliedAccessory = null;
            accGlasses.classList.remove('selected');
            
            zoomScale = 1.0;
            document.querySelector('.video-wrapper').style.transform = `scale(1)`;
        });

        // --- Utilities ---
        // Distance between 3D points
        function calculateDistance(p1, p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dz = p1.z - p2.z;
            return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        // Custom Colored Connectors
        function drawColoredConnectors(ctx, landmarks) {
            const colorMap = {
                '0,1': 'red', '1,2': 'red', '2,3': 'red', '3,4': 'red',
                '0,5': 'green', '5,6': 'green', '6,7': 'green', '7,8': 'green',
                '5,9': 'pink', '9,10': 'pink', '10,11': 'pink', '11,12': 'pink',
                '9,13': 'violet', '13,14': 'violet', '14,15': 'violet', '15,16': 'violet',
                '13,17': 'black', '17,18': 'black', '18,19': 'black', '19,20': 'black',
                '0,17': 'black'
            };

            ctx.lineWidth = 1.5;
            HAND_CONNECTIONS.forEach(cn => {
                const key = `${cn[0]},${cn[1]}`;
                const color = colorMap[key] || 'white';
                ctx.strokeStyle = color;
                ctx.beginPath();
                ctx.moveTo(landmarks[cn[0]].x * canvasElement.width, landmarks[cn[0]].y * canvasElement.height);
                ctx.lineTo(landmarks[cn[1]].x * canvasElement.width, landmarks[cn[1]].y * canvasElement.height);
                ctx.stroke();
            });
        }

        // Heart Animation
        function drawHearts(ctx) {
            for (let i = hearts.length - 1; i >= 0; i--) {
                let h = hearts[i];
                h.y -= h.speed;
                if (h.y < 0) {
                    hearts.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = "red";
                ctx.font = `${h.size}px Arial`;
                ctx.fillText("❤️", h.x, h.y);
                ctx.restore();
            }
        }

        // Globe 3D Simulation
        function drawGlobe(ctx, hands) {
            if (hands.length < 2) return; // Require 2 hands for distance
            
            const w = canvasElement.width;
            const h = canvasElement.height;
            
            // Get center of palm for both hands
            const getPalmCenter = (landmarks) => {
                let cx = 0, cy = 0;
                const points = [0, 5, 9, 13, 17]; // Wrist and knuckle bases
                for (let idx of points) {
                    cx += landmarks[idx].x;
                    cy += landmarks[idx].y;
                }
                return { x: (cx / points.length) * w, y: (cy / points.length) * h };
            };
            
            const p1 = getPalmCenter(hands[0]);
            const p2 = getPalmCenter(hands[1]);
            
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const distanceBetweenHands = Math.sqrt(dx * dx + dy * dy);
            
            // Radius is half the distance between hands
            const dist = distanceBetweenHands / 2; 
            
            globeRotY += 0.02; 
            globeRotX += 0.01;
            
            ctx.save();
            ctx.translate(midX, midY);
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00f0ff';
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.8)';
            ctx.lineWidth = 2;
            
            // Base sphere with a very light blue fill glow
            ctx.beginPath();
            ctx.arc(0, 0, dist, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(173, 216, 230, 0.15)'; 
            ctx.fill();
            ctx.stroke();
            
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.ellipse(0, 0, dist, Math.max(0.1, dist * Math.abs(Math.cos(globeRotY + (i * Math.PI/4)))), 0, 0, Math.PI * 2);
                ctx.stroke();

                ctx.beginPath();
                ctx.ellipse(0, 0, Math.max(0.1, dist * Math.abs(Math.sin(globeRotX + (i * Math.PI/4)))), dist, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Interpret gesture based on finger states
        function interpretGesture(landmarks) {
            const wrist = landmarks[0];
            const isExtended = (tipIdx, pipIdx) => {
                return calculateDistance(wrist, landmarks[tipIdx]) > calculateDistance(wrist, landmarks[pipIdx]) * 1.1;
            };

            const thumb = isExtended(4, 3);
            const index = isExtended(8, 6);
            const middle = isExtended(12, 10);
            const ring = isExtended(16, 14);
            const pinky = isExtended(20, 18);

            const pinchDist = calculateDistance(landmarks[4], landmarks[8]);
            const isPinching = pinchDist < 0.08;

            if (isPinching && middle && ring && pinky) return { text: "OK Sign", type: "ok" };
            if (!thumb && index && middle && !ring && !pinky) return { text: "Peace Sign", type: "peace" };
            if (thumb && index && !middle && !ring && pinky) return { text: "I Love You", type: "ily" };
            if (thumb && !index && !middle && !ring && !pinky) return { text: "Thumbs Up", type: "thumbs" };

            if (isPinching && !middle && !ring && !pinky) return { text: "Fire!", type: "fire" };

            if (isPinching) return { text: "🤏 Pinch Detected", type: "pinch" };
            const total = [thumb, index, middle, ring, pinky].filter(Boolean).length;
            if (total > 0) return { text: "🖐️ Tracking Fingers", type: "open" };

            return { text: "Tracking...", type: "none" };
        }

        // Ironman Rendering
        function drawIronman(ctx, landmarks, state, pieces, startMs) {
            const now = performance.now();
            const repulsorNow = now - repulsorStartMs;
            let allArrived = true;

            const palmCenter = {
                x: (landmarks[0].x + landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 5,
                y: (landmarks[0].y + landmarks[5].y + landmarks[9].y + landmarks[13].y + landmarks[17].y) / 5
            };
            const reps = [...landmarks, palmCenter];

            if (state === 'incoming') {
                for (let i = 0; i < reps.length; i++) {
                    const p = pieces[i];
                    const pt = reps[i];
                    const targetX = pt.x * canvasElement.width;
                    const targetY = pt.y * canvasElement.height;

                    const timePassed = now - startMs - p.delay;
                    if (timePassed < 0) {
                        allArrived = false;
                        continue;
                    }

                    let t = timePassed / p.duration;
                    if (t >= 1) t = 1;
                    else allArrived = false;

                    const ease = t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                    const cx = canvasElement.width / 2;
                    const cy = canvasElement.height / 2;

                    const currentX = (cx + p.sx) + (targetX - (cx + p.sx)) * ease;
                    const currentY = (cy + p.sy) + (targetY - (cy + p.sy)) * ease;

                    ctx.beginPath();
                    ctx.arc(currentX, currentY, i === 21 ? 12 : 5, 0, Math.PI * 2);
                    ctx.fillStyle = i === 21 ? '#a5f3fc' : '#fca5a5';
                    ctx.shadowColor = i === 21 ? '#06b6d4' : '#ef4444';
                    ctx.shadowBlur = i === 21 ? 20 : 10;
                    ctx.fill();
                }
                if (allArrived) ironState = 'active';
            }

            if (ironState === 'active' || allArrived) {
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.lineWidth = 15;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.strokeStyle = '#b91c1c'; // Outer red armor

                HAND_CONNECTIONS.forEach(cn => {
                    const p1 = landmarks[cn[0]];
                    const p2 = landmarks[cn[1]];
                    ctx.beginPath();
                    ctx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    ctx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    ctx.stroke();
                });

                ctx.lineWidth = 8;
                ctx.strokeStyle = '#ef4444'; // Bright red inner armor
                HAND_CONNECTIONS.forEach(cn => {
                    const p1 = landmarks[cn[0]];
                    const p2 = landmarks[cn[1]];
                    ctx.beginPath();
                    ctx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    ctx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    ctx.stroke();
                });

                // Gold plates on joints
                ctx.lineWidth = 2;
                landmarks.forEach((lm, idx) => {
                    if (idx === 0) return;
                    ctx.beginPath();
                    ctx.arc(lm.x * canvasElement.width, lm.y * canvasElement.height, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#fbbf24'; // Gold plate
                    ctx.fill();
                    ctx.strokeStyle = '#d97706';
                    ctx.stroke();
                });

                // Palm Repulsor
                const px = palmCenter.x * canvasElement.width;
                const py = palmCenter.y * canvasElement.height;
                const pulse = Math.sin(repulsorNow * 0.004) * 3;

                ctx.beginPath();
                ctx.arc(px, py, 22 + pulse, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#06b6d4';
                ctx.shadowBlur = 35 + pulse * 5;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(px, py, 14, 0, Math.PI * 2);
                ctx.fillStyle = '#cffafe';
                ctx.shadowBlur = 0;
                ctx.fill();

                ctx.lineWidth = 4;
                ctx.strokeStyle = '#0891b2'; // Cyan border
                ctx.stroke();

                // Inner core glow
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            }
        }

        // Count fingers open on a single hand
        function countFingersOpen(landmarks) {
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20]; // Index, Middle, Ring, Pinky
            const pips = [6, 10, 14, 18];
            let fingersExtended = 0;

            for (let i = 0; i < 4; i++) {
                const tipDist = calculateDistance(wrist, landmarks[tips[i]]);
                const pipDist = calculateDistance(wrist, landmarks[pips[i]]);
                if (tipDist > pipDist * 1.1) fingersExtended++;
            }

            // Thumb logic
            const thumbTipDist = calculateDistance(wrist, landmarks[4]);
            const thumbIpDist = calculateDistance(wrist, landmarks[3]);
            if (thumbTipDist > thumbIpDist * 1.1) fingersExtended++;

            return fingersExtended;
        }

        // Canvas Resizer to wrap video intrinsically
        function resizeCanvas() {
            // Only set intrinsic canvas size if it differs significantly
            if (videoElement.videoWidth && videoElement.videoHeight) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        
        // ==========================================
        // Utility & Feature Extraction Functions
        // ==========================================
        
        // Extract and expose specific facial landmarks for downstream tasks
        function updateFaceData(landmarks) {
            if (!landmarks) return;
            faceData.noseTip = landmarks[4];
            faceData.leftEyeCenter = landmarks[159];
            faceData.rightEyeCenter = landmarks[386];
            faceData.chin = landmarks[152];
            faceData.forehead = landmarks[10];
            faceData.leftEar = landmarks[234];
            faceData.rightEar = landmarks[454];
        }

        // Clear coordinates when face is lost
        function clearFaceData() {
            faceData.noseTip = null;
            faceData.leftEyeCenter = null;
            faceData.rightEyeCenter = null;
            faceData.chin = null;
            faceData.forehead = null;
            faceData.leftEar = null;
            faceData.rightEar = null;
        }

        // ==========================================
        // MediaPipe Tracking Callbacks
        // ==========================================

        function onHandResults(results) {
            latestHandResults = results;
        }

        function onFaceResults(results) {
            latestFaceResults = results;
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                updateFaceData(results.multiFaceLandmarks[0]);
            } else {
                clearFaceData();
            }
        }

        // ==========================================
        // Rendering Module
        // ==========================================

        function detectEmotion(landmarks) {
            if (!landmarks || landmarks.length < 468) return "Neutral 😐";
            
            const p = (i) => landmarks[i];
            
            // Face bounding box for normalization (forehead to chin)
            const faceHeight = calculateDistance(p(10), p(152));
            if (faceHeight === 0) return "Neutral 😐";

            // Mouth features
            const cornersY = (p(61).y + p(291).y) / 2;
            const centerMouthY = (p(13).y + p(14).y) / 2;
            const emotionDiff = (centerMouthY - cornersY) / faceHeight; // >0 smile, <0 sad
            const mouthOpen = calculateDistance(p(13), p(14)) / faceHeight;

            // Eyebrow features
            // Left brow: inner=107, outer=46. Right brow: inner=336, outer=276
            const browSlopeLeft = (p(107).y - p(46).y) / faceHeight; 
            const browSlopeRight = (p(336).y - p(276).y) / faceHeight;
            const avgBrowSlope = (browSlopeLeft + browSlopeRight) / 2; 
            // avgBrowSlope > 0 => Angry (inner lower than outer)
            // avgBrowSlope < 0 => Sad/Fear (inner higher than outer)

            // Brow Heights for asymmetry (Cunning)
            const leftBrowDist = calculateDistance(p(105), p(159)) / faceHeight;
            const rightBrowDist = calculateDistance(p(334), p(386)) / faceHeight;
            const browAsymmetry = Math.abs(leftBrowDist - rightBrowDist);

            // Eye Openness (for Laughter)
            const leftEyeOpen = calculateDistance(p(159), p(145)) / faceHeight;
            const rightEyeOpen = calculateDistance(p(386), p(374)) / faceHeight;
            const avgEyeOpen = (leftEyeOpen + rightEyeOpen) / 2;

            // 2. LAUGHTER: Big smile, mouth open, eyes squinting/closed
            if (emotionDiff > 0.015 && mouthOpen > 0.04 && avgEyeOpen < 0.025) {
                return "LAUGHTER 😂";
            }

            // 3. ANGER: Inner brows lower than outer (positive slope)
            if (avgBrowSlope > 0.005 && emotionDiff < 0.01) {
                return "ANGER 😡";
            }

            // 4. FEAR: Inner brows higher (negative slope), mouth wide open
            if (avgBrowSlope < -0.005 && mouthOpen > 0.04 && emotionDiff < 0.01) {
                return "FEAR 😨";
            }

            // 5. SADNESS: Inner brows higher, mouth frowning
            if (avgBrowSlope < -0.005 && emotionDiff < -0.01) {
                return "SADNESS 😢";
            }

            // 6. Smile: Normal smile
            if (emotionDiff > 0.015) {
                return "Smile 😊";
            }

            return "Neutral 😐";
        }

        // Render Face Mesh
        function drawFaceMesh(ctx, results) {
            const emotionDisplay = document.getElementById('emotionDisplay');
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                if (emotionDisplay) emotionDisplay.textContent = "Neutral 😐";
                return;
            }

            const landmarks = results.multiFaceLandmarks[0];
            
            if (emotionDisplay) {
                emotionDisplay.textContent = detectEmotion(landmarks);
            }

            const width = canvasElement.width;
            const height = canvasElement.height;

            // 1. Draw 468 points as small circles
            ctx.fillStyle = 'rgba(0, 240, 255, 0.35)'; // Semi-transparent cyan
            for (let i = 0; i < landmarks.length; i++) {
                const lm = landmarks[i];
                ctx.beginPath();
                ctx.arc(lm.x * width, lm.y * height, 1.5, 0, 2 * Math.PI);
                ctx.fill();
            }

            // 2. Overlay key landmarks with distinct colored markers
            const keyPoints = [
                { pt: faceData.noseTip, color: '#ff0055' },      // Red nose tip
                { pt: faceData.leftEyeCenter, color: '#00ff88' }, // Green left pupil/eye center
                { pt: faceData.rightEyeCenter, color: '#00ff88' },// Green right pupil/eye center
                { pt: faceData.chin, color: '#00f0ff' },          // Cyan chin
                { pt: faceData.forehead, color: '#ffff00' },      // Yellow forehead
                { pt: faceData.leftEar, color: '#ff00ff' },       // Magenta left ear region
                { pt: faceData.rightEar, color: '#ff00ff' }       // Magenta right ear region
            ];

            keyPoints.forEach(kp => {
                if (kp.pt) {
                    ctx.beginPath();
                    ctx.arc(kp.pt.x * width, kp.pt.y * height, 4.5, 0, 2 * Math.PI);
                    ctx.fillStyle = kp.color;
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });

            // Render Glasses
            if (appliedAccessory === 'wafer_glasses' && glassesImg.complete) {
                const leftEye = landmarks[133];
                const rightEye = landmarks[362];
                const leftTemple = landmarks[234];
                const rightTemple = landmarks[454];
                
                // Use temples for width
                const dx = rightTemple.x - leftTemple.x;
                const dy = rightTemple.y - leftTemple.y;
                const glassWidth = Math.sqrt(dx * dx + dy * dy) * width * 1.15; // Slightly wider than face
                const angle = Math.atan2(dy, dx);
                
                // Center between eyes
                const cx = (leftEye.x + rightEye.x) / 2 * width;
                const cy = (leftEye.y + rightEye.y) / 2 * height;
                
                const glassHeight = glassWidth * (glassesImg.height / glassesImg.width);
                
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle);
                
                // Draw Image (slightly lowered to rest on the nose)
                const yOffset = glassHeight * 0.08;
                ctx.drawImage(glassesImg, -glassWidth/2, -glassHeight/2 + yOffset, glassWidth, glassHeight);
                
                ctx.restore();
            }
        }

        // Render Hand Landmarks and Gestures
        function drawHands(ctx, results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            let totalFingersOpen = 0;
            let anyPinching = false;
            let primaryThumbTip = null, primaryIndexTip = null, primaryMiddleTip = null, primaryPinchDist = 0;
            let primaryGesture = null;

            // Process logic and draw skeletons for all hands
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];

                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const middleTip = landmarks[12];

                if (i === 0) {
                    primaryThumbTip = thumbTip;
                    primaryIndexTip = indexTip;
                    primaryMiddleTip = middleTip;
                    primaryPinchDist = calculateDistance(thumbTip, indexTip);
                    primaryGesture = interpretGesture(landmarks);
                    
                    // Pinch Zoom mapping: pinch in (distance decreases) -> zoom out. Pinch out -> zoom in.
                    if (isPinchZoomEnabled) {
                        if (prevGlobalPinchDist !== -1) {
                            let delta = primaryPinchDist - prevGlobalPinchDist;
                            zoomScale += delta * 5.0; 
                            zoomScale = Math.max(0.5, Math.min(zoomScale, 4.0));
                        }
                        prevGlobalPinchDist = primaryPinchDist;
                    }

                    if (primaryGesture.type === 'ily') {
                        if (Math.random() > 0.5) {
                            hearts.push({
                                x: Math.random() * canvasElement.width,
                                y: canvasElement.height + 50,
                                speed: 2 + Math.random() * 5,
                                size: 20 + Math.random() * 40
                            });
                        }
                    }
                }

                const pinchDist = calculateDistance(thumbTip, indexTip);
                if (pinchDist < 0.08) anyPinching = true;

                totalFingersOpen += countFingersOpen(landmarks);

                if (ironState === 'none') {
                    if (isSkeletonEnabled) {
                        drawColoredConnectors(ctx, landmarks);

                        drawLandmarks(ctx, landmarks, {
                            color: 'rgba(148, 163, 184, 0.8)',
                            fillColor: '#0f172a',
                            lineWidth: 1,
                            radius: 4
                        });
                    }

                    const specials = [
                        { pt: thumbTip, color: '#ff3b30' }, // Red (Thumb)
                        { pt: indexTip, color: '#4cd964' }, // Green (Index)
                        { pt: middleTip, color: '#af52de' } // Purple/Magenta (Middle)
                    ];

                    specials.forEach(s => {
                        ctx.beginPath();
                        ctx.arc(s.pt.x * canvasElement.width, s.pt.y * canvasElement.height, 8, 0, 2 * Math.PI);
                        ctx.fillStyle = s.color;
                        ctx.fill();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = '#fff';
                        ctx.stroke();
                    });

                    if (pinchDist < 0.08) {
                        ctx.beginPath();
                        ctx.moveTo(thumbTip.x * canvasElement.width, thumbTip.y * canvasElement.height);
                        ctx.lineTo(indexTip.x * canvasElement.width, indexTip.y * canvasElement.height);
                        ctx.strokeStyle = '#38bdf8';
                        ctx.lineWidth = 4;
                        ctx.stroke();

                        const midX = (thumbTip.x + indexTip.x) / 2 * canvasElement.width;
                        const midY = (thumbTip.y + indexTip.y) / 2 * canvasElement.height;

                        ctx.beginPath();
                        ctx.arc(midX, midY, 15, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(56, 189, 248, 0.4)';
                        ctx.fill();
                    }
                } else {
                    drawIronman(ctx, landmarks, ironState, ironPieces, ironStartMs);
                }
            }
            
            if (globeMode && results.multiHandLandmarks.length > 0) {
                drawGlobe(ctx, results.multiHandLandmarks);
            }

            // --- UI Updates ---
            totalFingersDisplay.textContent = totalFingersOpen;

            const sidebarTotalFingersPanel = document.getElementById('sidebarTotalFingersPanel');
            if (sidebarTotalFingersPanel && results.multiHandLandmarks.length > 0) {
                sidebarTotalFingersPanel.style.display = 'flex';
            }

            // Update Gesture State Text in Sidebar
            if (gestureBoxText) {
                if (primaryGesture && primaryGesture.type !== 'none' && primaryGesture.type !== 'open' && primaryGesture.type !== 'pinch') {
                    gestureBoxText.textContent = primaryGesture.text.toUpperCase();
                } else if (anyPinching) {
                    gestureBoxText.textContent = "PINCH DETECTED";
                } else if (totalFingersOpen > 0) {
                    gestureBoxText.textContent = "TRACKING FINGERS";
                } else {
                    gestureBoxText.textContent = "TRACKING...";
                }
            }
        }

        // Draw overlays that shouldn't be horizontally mirrored
        function drawUnmirroredOverlays() {
            drawHearts(canvasCtx);

            if (latestHandResults && latestHandResults.multiHandLandmarks && latestHandResults.multiHandLandmarks.length > 0) {
                const primaryHand = latestHandResults.multiHandLandmarks[0];
                const thumbTip = primaryHand[4];
                const indexTip = primaryHand[8];
                const middleTip = primaryHand[12];
                const primaryGesture = interpretGesture(primaryHand);

                if (primaryGesture && primaryGesture.type === 'fire') {
                    const midX = (thumbTip.x + indexTip.x) / 2;
                    const midY = (thumbTip.y + indexTip.y) / 2;
                    
                    const realX = canvasElement.width - (midX * canvasElement.width);
                    const realY = (midY * canvasElement.height) - 40;
                    
                    canvasCtx.font = "40px Arial";
                    canvasCtx.textAlign = "center";
                    canvasCtx.textBaseline = "middle";
                    canvasCtx.fillText("🔥", realX, realY);
                }
            } else {
                prevGlobalPinchDist = -1;
                if (isLoaded) {
                    if (gestureBoxText) gestureBoxText.textContent = "WAITING FOR HANDS...";
                    totalFingersDisplay.textContent = "--";
                    const sidebarTotalFingersPanel = document.getElementById('sidebarTotalFingersPanel');
                    if (sidebarTotalFingersPanel) {
                        sidebarTotalFingersPanel.style.display = 'none';
                    }
                }
            }
        }

        // Main Rendering Loop - Combines all visuals in a single draw call
        function renderAll() {
            // UI Initial Load Transition
            if (!isLoaded) {
                isLoaded = true;
                resizeCanvas();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
                statusDot.classList.add('active');
            }

            // FPS Calculation
            const now = performance.now();
            frames++;
            if (now - lastTime >= 1000) {
                fpsDisplay.textContent = frames;
                frames = 0;
                lastTime = now;
            }

            // Verify canvas size
            if (videoElement.videoWidth && videoElement.videoHeight && 
                (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight)) {
                resizeCanvas();
            }

            // Prepare Canvas
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Apply Pinch Zoom Wrapper Transform
            document.querySelector('.video-wrapper').style.transform = `scale(${zoomScale})`;
            
            // Transform context to mirror the image horizontally (webcam feel)
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);

            // Draw current camera frame directly from video element
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            // Draw Face Mesh (if available)
            if (latestFaceResults) {
                drawFaceMesh(canvasCtx, latestFaceResults);
            }

            // Draw Hand Landmarks (if available)
            if (latestHandResults) {
                drawHands(canvasCtx, latestHandResults);
            }

            // Restore canvas context to un-mirror for overlays
            canvasCtx.restore();

            // Draw unmirrored overlays (Hearts, Fire emoji, text labels)
            drawUnmirroredOverlays();
            
            requestAnimationFrame(renderAll);
        }

        // --- AI Model Setup ---
        
        // Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1, // 1 is standard accuracy (better tracking, very fast still)
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        hands.onResults(onHandResults);

        // Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onFaceResults);

        // --- Camera Setup ---
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Reuse the same video frame for both MediaPipe models
                try {
                    await hands.send({ image: videoElement });
                } catch (error) {
                    console.error("Hand tracking error:", error);
                }
                try {
                    await faceMesh.send({ image: videoElement });
                } catch (error) {
                    console.error("Face tracking error:", error);
                }
            },
            width: 1280, // Request HD for better model performance
            height: 720
        });

        // Start Camera Stream
        camera.start();

        // Start rendering loop
        renderAll();
    </script>
</body>
